name: CI

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: trader_risk_radar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d trader_risk_radar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/trader_risk_radar
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck

      - name: Apply migrations
        run: bunx prisma migrate deploy

      - name: Run unit tests
        run: bun run test
