name: CI

on:
  push:
    branches:
      - '**'

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://localhost:5432/transaction_risk_radar
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck

      - name: Run unit tests
        run: bun run test
