services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: trader-risk-radar-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trader_risk_radar
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d trader_risk_radar']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: trader-risk-radar-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # 一次性服務：DB 起來後套用 migration，api / worker 等它成功才啟動。
  migrate:
    build:
      context: .
      target: runtime
    image: trader-risk-radar
    container_name: trader-risk-radar-migrate
    command: ['bunx', 'prisma', 'migrate', 'deploy']
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trader_risk_radar?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  # REST API（main.ts）。
  api:
    build:
      context: .
      target: runtime
    image: trader-risk-radar
    container_name: trader-risk-radar-api
    command: ['bun', 'run', 'start']
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trader_risk_radar?schema=public
      REDIS_URL: redis://redis:6379
      PORT: '3000'
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # 背景排程 worker（worker.ts）：sync → poll → recompute。
  worker:
    build:
      context: .
      target: runtime
    image: trader-risk-radar
    container_name: trader-risk-radar-worker
    command: ['bun', 'run', 'worker']
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trader_risk_radar?schema=public
      REDIS_URL: redis://redis:6379
      HYPERLIQUID_API_BASE_URL: https://api.hyperliquid.xyz
      HYPERLIQUID_STATS_DATA_BASE_URL: https://stats-data.hyperliquid.xyz
      MAXIMUM_TRADERS: '200'
      SYNC_INTERVAL_MS: '3600000'
      POLL_INTERVAL_MS: '30000'
      RECOMPUTE_INTERVAL_MS: '300000'
      POLL_LOOKBACK_MS: '7776000000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
